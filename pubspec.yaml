name: habitly
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Design & UI
  google_fonts: ^6.1.0
  flutter_phosphor_icons: ^0.0.1+6
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.0

  # Charts & Progress
  fl_chart: ^0.65.0
  percent_indicator: ^4.1.1

  # Navigation & Routing
  go_router: ^13.2.0

  # Utilities & Helpers
  intl: ^0.19.0
  uuid: ^4.0.0

  # JSON Serialization
  json_annotation: ^4.8.0

  # Storage
  shared_preferences: ^2.2.0

  # Additional UI Polish
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.1.1

  # Logging & Debugging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
